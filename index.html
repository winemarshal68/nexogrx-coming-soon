<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexoGRX — Próximamente</title>
  <meta name="description" content="NexoGRX — diseño y tecnología para la hostelería, desde Granada. Muy pronto.">
  <meta name="theme-color" content="#f7f3ee">
  <link rel="canonical" href="https://nexogrx.es/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">

  <!-- Open Graph / WhatsApp / iMessage preview -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="NexoGRX">
  <meta property="og:title" content="NexoGRX — Próximamente">
  <meta property="og:description" content="Diseño y tecnología para la hostelería, desde Granada. Muy pronto.">
  <meta property="og:url" content="https://nexogrx.es/">
  <meta property="og:locale" content="es_ES">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="NexoGRX — Próximamente">
  <meta name="twitter:description" content="Diseño y tecnología para la hostelería, desde Granada. Muy pronto.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap">

  <style>
    :root {
      --cream:       #f7f3ee;
      --espresso:    #2a1f14;
      --copper:      #b87333;
      --copper-glow: rgba(184, 115, 51, 0.20);
      --hairline:    rgba(184, 115, 51, 0.32);
      --muted:       rgba(42, 31, 20, 0.60);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 2.5rem 1.5rem;
      overflow: hidden;
      background-color: var(--cream);
      color: var(--espresso);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ── ambient breathing glow (sits behind everything) ── */
    .glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 60% 52% at 50% 41%, var(--copper-glow), transparent 70%);
      animation: breathe 9s ease-in-out infinite;
    }

    .stage {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 40rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── logo: arrival + continuous float, with a periodic sheen ── */
    .logo-wrap {
      position: relative;
      display: inline-block;
      overflow: hidden;
      animation:
        logoArrive 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both,
        float 6s ease-in-out 1.3s infinite;
    }
    .logo {
      display: block;
      width: clamp(260px, 64vw, 520px);
      height: auto;
      aspect-ratio: 1505 / 320;
    }
    .logo-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(105deg, transparent 40%, rgba(255, 251, 244, 0.55) 50%, transparent 60%);
      transform: translateX(-150%);
      animation: sheen 7s ease-out 1.6s infinite;
    }

    .eyebrow {
      margin-top: 1.5rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--copper);
      animation: fadeUp 0.8s ease-out 0.55s both;
    }

    .divider {
      width: 2.5rem;
      height: 1px;
      margin: 2.1rem 0;
      border: 0;
      background: linear-gradient(90deg, transparent, var(--hairline), transparent);
      animation: fadeUp 0.8s ease-out 0.66s both;
    }

    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: clamp(2.8rem, 8.5vw, 4.2rem);
      line-height: 1.02;
      letter-spacing: -0.015em;
      color: var(--espresso);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.78s both;
    }
    .pitch {
      margin-top: 1.15rem;
      max-width: 29rem;
      font-size: 1.025rem;
      line-height: 1.6;
      color: var(--muted);
      animation: fadeUp 0.8s ease-out 0.96s both;
    }

    .footer {
      margin-top: 3.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      animation: fadeUp 0.8s ease-out 1.14s both;
    }

    @keyframes logoArrive {
      from { opacity: 0; transform: translateY(16px) scale(0.9); filter: blur(8px); }
      to   { opacity: 1; transform: translateY(0)   scale(1);   filter: blur(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    @keyframes sheen {
      0%   { transform: translateX(-150%); }
      14%  { transform: translateX(150%); }
      100% { transform: translateX(150%); }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.07); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .glow { animation: none; opacity: 0.85; }
      .logo-wrap { animation: none; }
      .logo-wrap::after { display: none; }
      .eyebrow, .divider, .headline, .pitch, .footer { animation: none; }
    }

    @media (max-width: 30rem) {
      .divider { margin: 1.75rem 0; }
      .footer { margin-top: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <main class="stage">
    <div class="logo-wrap">
      <img class="logo" src="/logo.svg" alt="NexoGRX" width="520" height="111">
    </div>
    <p class="eyebrow">Granada · España</p>

    <hr class="divider">

    <h1 class="headline">Próximamente</h1>
    <p class="pitch">Diseño y tecnología para la hostelería, desde Granada.</p>

    <footer class="footer">© 2026 NexoGRX</footer>
  </main>
</body>
</html>
