<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexoGRX — Próximamente</title>
  <meta name="description" content="NexoGRX — diseño y tecnología para la hostelería, desde Granada. Muy pronto.">
  <meta name="theme-color" content="#f7f3ee">
  <link rel="canonical" href="https://nexogrx.es/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Open Graph / WhatsApp / iMessage preview -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="NexoGRX">
  <meta property="og:title" content="NexoGRX — Próximamente">
  <meta property="og:description" content="Diseño y tecnología para la hostelería, desde Granada. Muy pronto.">
  <meta property="og:url" content="https://nexogrx.es/">
  <meta property="og:locale" content="es_ES">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="NexoGRX — Próximamente">
  <meta name="twitter:description" content="Diseño y tecnología para la hostelería, desde Granada. Muy pronto.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap">

  <style>
    :root {
      --cream:      #f7f3ee;
      --espresso:   #2a1f14;
      --gold:       #b8955a;
      --gold-glow:  rgba(184, 149, 90, 0.22);
      --gold-soft:  rgba(184, 149, 90, 0.15);
      --hairline:   rgba(184, 149, 90, 0.25);
      --muted:      rgba(42, 31, 20, 0.62);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 2.5rem 1.5rem;
      background-color: var(--cream);
      background-image: radial-gradient(ellipse 62% 52% at 50% 42%, var(--gold-glow), transparent 70%);
      color: var(--espresso);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .stage {
      width: 100%;
      max-width: 36rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: rise 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ── brand lockup ── */
    .mark {
      display: grid;
      place-items: center;
      width: 4.5rem;
      height: 4.5rem;
      border-radius: 1rem;
      background: var(--gold-soft);
      border: 1px solid var(--hairline);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 2.65rem;
      line-height: 1;
      color: var(--gold);
    }
    .wordmark {
      margin-top: 1.15rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: 0.01em;
      color: var(--espresso);
    }
    .eyebrow {
      margin-top: 0.6rem;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .divider {
      width: 2.5rem;
      height: 1px;
      margin: 2.25rem 0;
      border: 0;
      background: linear-gradient(90deg, transparent, var(--hairline), transparent);
    }

    /* ── message ── */
    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: clamp(3rem, 9vw, 4.5rem);
      line-height: 1.02;
      letter-spacing: -0.015em;
      color: var(--espresso);
    }
    .pitch {
      margin-top: 1.15rem;
      max-width: 28rem;
      font-size: 1.025rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .footer {
      margin-top: 3.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .stage { animation: none; }
    }
    @media (max-width: 30rem) {
      .mark { width: 4rem; height: 4rem; font-size: 2.35rem; }
      .wordmark { font-size: 1.7rem; }
      .divider { margin: 1.85rem 0; }
      .footer { margin-top: 2.5rem; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <span class="mark" aria-hidden="true">N</span>
    <div class="wordmark">NexoGRX</div>
    <p class="eyebrow">Granada · España</p>

    <hr class="divider">

    <h1 class="headline">Próximamente</h1>
    <p class="pitch">Diseño y tecnología para la hostelería, desde Granada.</p>

    <footer class="footer">© 2026 NexoGRX</footer>
  </main>
</body>
</html>
